<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Цифровой сад состояний</title>
  <style>
    :root {
      --ease: cubic-bezier(.22,1,.36,1);
      --bg1: #f4efe7;
      --bg2: #e9e0d3;
      --bg3: #ddd1bf;
      --text: #241d18;
      --soft: rgba(36,29,24,.66);
      --faint: rgba(36,29,24,.42);
      --card: rgba(255,255,255,.40);
      --line: rgba(255,255,255,.54);
      --accent: #9c7746;
      --nightText: #edf2ee;
      --radiusFrame: 34px;
      --radiusPanel: 24px;
      --radiusBtn: 18px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    *::before,*::after{box-sizing:border-box}
    html,body{width:100%;height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
      min-height:100vh;min-height:100dvh;overflow:hidden;color:var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.84), transparent 34%),
        linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 48%,var(--bg3) 100%);
      transition:background .45s var(--ease), color .3s var(--ease);
    }
    .sky{position:fixed;inset:0;z-index:0;pointer-events:none;transition:opacity .45s var(--ease), background .45s var(--ease);background:radial-gradient(circle at 24% 14%, rgba(255,255,255,.42), transparent 20%),radial-gradient(circle at 82% 14%, rgba(221,200,168,.18), transparent 18%)}
    .sky::before,.sky::after{content:"";position:absolute;inset:-8%;pointer-events:none;opacity:0;transition:opacity .65s var(--ease)}
    .branches{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.72;transition:opacity .45s var(--ease)}
    .shell{position:relative;z-index:2;min-height:100dvh;display:flex;justify-content:center;padding:16px}
    .frame{width:100%;max-width:510px;min-height:calc(100dvh - 32px);display:flex;flex-direction:column;overflow:hidden;position:relative;border-radius:var(--radiusFrame);border:1px solid var(--line);background:linear-gradient(180deg,var(--card),rgba(255,255,255,.24));box-shadow:0 24px 64px rgba(70,54,34,.08), inset 0 1px 0 rgba(255,255,255,.82), inset 0 -1px 0 rgba(255,255,255,.14);backdrop-filter:blur(22px) saturate(1.08);-webkit-backdrop-filter:blur(22px) saturate(1.08)}
    header{padding:22px 20px 10px;text-align:center}
    h1{font-size:21px;font-weight:600;letter-spacing:-.02em}
    .sub{margin-top:6px;font-size:13px;line-height:1.4;color:var(--soft)}
    .content{flex:1;position:relative;overflow:hidden}
    .view{position:absolute;inset:0;display:none;flex-direction:column;gap:14px;padding:18px;overflow-y:auto;-webkit-overflow-scrolling:touch}.view.active{display:flex}
    .card,.garden,.actions,.helpBox,textarea{background:linear-gradient(180deg,rgba(255,255,255,.44),rgba(255,255,255,.26));border:1px solid rgba(255,255,255,.50);box-shadow:inset 0 1px 0 rgba(255,255,255,.72),0 10px 24px rgba(0,0,0,.04)}
    .card{border-radius:var(--radiusPanel);padding:18px}.top{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}.label{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--soft)}.state{font-size:28px;line-height:1.05;font-weight:600;letter-spacing:-.03em;text-align:right}.desc{font-size:13px;line-height:1.45;color:rgba(43,36,30,.76)}
    .barWrap{position:relative;margin:16px 0 12px}.barBg{position:absolute;inset:50% 0 auto 0;transform:translateY(-50%);height:12px;border-radius:999px;background:rgba(0,0,0,.05);overflow:hidden}.barFill{height:100%;width:50%;border-radius:inherit;background:linear-gradient(90deg,#d1b895 0%,#b2a680 45%,#8a9a72 100%)}
    input[type=range]{position:relative;z-index:2;width:100%;height:34px;background:transparent;appearance:none;outline:none}input[type=range]::-webkit-slider-thumb{appearance:none;width:30px;height:30px;border-radius:50%;background:linear-gradient(180deg,#fff,#f2ebe2);border:2px solid var(--accent);box-shadow:0 6px 14px rgba(0,0,0,.10),inset 0 1px 0 rgba(255,255,255,.95)}
    .scaleLabels{display:flex;gap:6px;justify-content:space-between;margin-top:8px;font-size:10px;color:var(--faint);line-height:1.2}.scaleLabels span{flex:1;text-align:center}
    textarea{width:100%;height:120px;border-radius:var(--radiusPanel);padding:16px;resize:none;font:inherit;font-size:15px;line-height:1.45;color:var(--text);outline:none}textarea::placeholder{color:rgba(58,44,31,.42)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}button{appearance:none;border:none;cursor:pointer;font:inherit}.btn{width:100%;min-height:52px;border-radius:var(--radiusBtn);border:1px solid rgba(255,255,255,.66);background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(245,239,231,.92));color:var(--text);font-size:15px;font-weight:700;box-shadow:0 8px 20px rgba(0,0,0,.05), inset 0 1px 0 rgba(255,255,255,.95)}
    .garden{flex:1;min-height:340px;border-radius:var(--radiusPanel);position:relative;overflow:hidden;background:radial-gradient(circle at 50% 18%, rgba(255,255,255,.20), transparent 28%),linear-gradient(180deg,rgba(255,255,255,.30),rgba(255,255,255,.18))}.garden::before,.garden::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .45s var(--ease)}
    .empty{position:absolute;inset:0;display:grid;place-items:center;text-align:center;color:rgba(43,36,30,.30);padding:28px;line-height:1.45;font-size:16px;z-index:1}
    .creature{position:absolute;width:84px;min-height:84px;padding:8px;border-radius:28px;border:1px solid rgba(255,255,255,.78);display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;line-height:1.15;font-weight:600;color:rgba(34,28,22,.92);box-shadow:0 18px 34px rgba(0,0,0,.10),0 0 0 1px rgba(255,255,255,.16), inset 0 1px 0 rgba(255,255,255,.62);backdrop-filter:blur(14px) saturate(1.08);-webkit-backdrop-filter:blur(14px) saturate(1.08);transition:left 1.2s var(--ease), top 1.2s var(--ease), opacity 1.6s var(--ease), filter 1.6s var(--ease), box-shadow .4s var(--ease);animation:breath 6.5s ease-in-out infinite;z-index:2}.creature::before{content:"";position:absolute;inset:1px;border-radius:inherit;background:radial-gradient(circle at 30% 25%, rgba(255,255,255,.58), transparent 34%),linear-gradient(180deg,rgba(255,255,255,.18),transparent 65%);opacity:.85}.creature span{position:relative;z-index:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;padding:0 2px;max-width:100%;text-shadow:0 1px 0 rgba(255,255,255,.28)}.creature.selected{box-shadow:0 0 0 2px rgba(167,132,83,.42),0 22px 42px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.62);transform:scale(1.08)}@keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
    .actions{display:none;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;border-radius:20px}.actions.show{display:grid}.actions .btn{min-height:46px;font-size:12px;padding:10px}
    .helpBox{flex:1;min-height:320px;border-radius:var(--radiusPanel);overflow:hidden;position:relative;background:radial-gradient(circle at 50% 18%, rgba(255,255,255,.22), transparent 28%),linear-gradient(180deg,rgba(255,255,255,.30),rgba(255,255,255,.18))}#calmCanvas{position:absolute;inset:0;width:100%;height:100%;display:block}
    .nav{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px;background:rgba(255,255,255,.38);border-top:1px solid rgba(255,255,255,.32);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.tab{padding:11px 10px;border-radius:14px;font-size:12px;font-weight:600;color:rgba(38,35,31,.48);background:none}.tab.active{background:rgba(255,255,255,.72);color:#9a7746;box-shadow:inset 0 1px 0 rgba(255,255,255,.8),0 4px 12px rgba(0,0,0,.04)}
    .overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(10,12,11,.66);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}.modal{width:100%;max-width:420px;border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(247,241,233,.90));border:1px solid rgba(255,255,255,.65);box-shadow:0 24px 70px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.95);padding:20px}.modal h2{font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:12px;text-align:center}.modal p{font-size:15px;line-height:1.55;color:rgba(43,36,30,.84);text-align:center}.modalRow{display:grid;gap:10px;margin-top:18px}.sign{padding:8px 18px 14px;text-align:center;font-size:12px;letter-spacing:.03em;color:rgba(36,29,24,.26)}
    @keyframes starPulse{0%,100%{opacity:.58;transform:scale(1)}50%{opacity:.95;transform:scale(1.07)}}
    @keyframes auroraFloat{0%{transform:translate3d(-2%,-1%,0) rotate(-3deg) scale(1);opacity:.42}50%{transform:translate3d(2%,1.5%,0) rotate(1deg) scale(1.06);opacity:.72}100%{transform:translate3d(-1.5%,2%,0) rotate(3deg) scale(1.02);opacity:.48}}
    @keyframes hazeDrift{0%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(1.5%,-1.5%,0) scale(1.03)}100%{transform:translate3d(-1.5%,1%,0) scale(1.01)}}
    body.night{background:
      radial-gradient(ellipse at 50% -14%, rgba(255,231,186,.12) 0%, transparent 24%),
      radial-gradient(circle at 16% 14%, rgba(75,113,140,.22) 0%, transparent 28%),
      radial-gradient(circle at 82% 10%, rgba(67,84,127,.18) 0%, transparent 24%),
      linear-gradient(180deg,#010205 0%,#02050b 18%,#07101c 42%,#0c1620 68%,#121821 100%);
      color:var(--nightText)}
    body.night .sky{
      background:
        radial-gradient(circle at 8% 10%, rgba(255,255,255,.94) 0 0.7px, transparent 1.25px),
        radial-gradient(circle at 16% 24%, rgba(255,255,255,.78) 0 0.75px, transparent 1.25px),
        radial-gradient(circle at 24% 8%, rgba(255,255,255,.58) 0 0.55px, transparent 1.05px),
        radial-gradient(circle at 34% 18%, rgba(255,255,255,.84) 0 0.75px, transparent 1.35px),
        radial-gradient(circle at 46% 10%, rgba(255,255,255,.68) 0 0.6px, transparent 1.15px),
        radial-gradient(circle at 58% 16%, rgba(255,255,255,.78) 0 0.68px, transparent 1.2px),
        radial-gradient(circle at 70% 8%, rgba(255,255,255,.90) 0 0.82px, transparent 1.35px),
        radial-gradient(circle at 78% 22%, rgba(255,255,255,.74) 0 0.58px, transparent 1.1px),
        radial-gradient(circle at 88% 12%, rgba(255,255,255,.82) 0 0.76px, transparent 1.25px),
        linear-gradient(106deg,transparent 18%,rgba(76,100,153,.05) 34%,rgba(165,183,223,.09) 46%,rgba(251,238,204,.16) 50%,rgba(167,184,224,.08) 56%,rgba(86,106,160,.05) 64%,transparent 78%),
        radial-gradient(ellipse at 52% 18%, rgba(255,244,219,.08) 0%, transparent 20%),
        radial-gradient(ellipse at 48% 18%, rgba(160,184,232,.07) 0%, transparent 30%);
      opacity:.98
    }
    body.night .sky::before{
      opacity:.95;
      background:
        radial-gradient(ellipse at 24% 20%, rgba(104,161,150,.15) 0%, transparent 34%),
        radial-gradient(ellipse at 68% 18%, rgba(121,105,172,.11) 0%, transparent 30%),
        radial-gradient(ellipse at 54% 8%, rgba(235,222,180,.08) 0%, transparent 18%);
      filter:blur(24px);
      animation:auroraFloat 20s ease-in-out infinite alternate;
      mix-blend-mode:screen;
    }
    body.night .sky::after{
      opacity:.8;
      inset:-2%;
      background:
        radial-gradient(circle at 72% 14%, rgba(255,248,233,.14) 0%, rgba(255,244,219,.04) 10%, transparent 22%),
        radial-gradient(circle at 72% 14%, rgba(255,255,255,.82) 0 1.05px, transparent 2.2px),
        radial-gradient(circle at 19% 36%, rgba(255,255,255,.10) 0 .45px, transparent 1px),
        radial-gradient(circle at 32% 28%, rgba(255,255,255,.14) 0 .55px, transparent 1.1px),
        radial-gradient(circle at 64% 34%, rgba(255,255,255,.10) 0 .45px, transparent .95px),
        radial-gradient(circle at 84% 30%, rgba(255,255,255,.12) 0 .5px, transparent 1px);
      animation:hazeDrift 24s ease-in-out infinite alternate;
    }
    body.night .branches{opacity:.18}
    body.night .frame{
      background:
        linear-gradient(180deg, rgba(15,20,27,.88), rgba(9,12,17,.84)),
        linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0));
      border:1px solid rgba(236,228,212,.08);
      box-shadow:0 42px 120px rgba(0,0,0,.56),0 12px 34px rgba(3,5,8,.40),inset 0 1px 0 rgba(255,255,255,.065),inset 0 -1px 0 rgba(255,255,255,.015),0 0 0 1px rgba(129,159,191,.02)
    }
    body.night h1,body.night .state{color:#f4f7f4}
    body.night .sub,body.night .label,body.night .desc,body.night .scaleLabels{color:rgba(229,236,231,.72)}
    body.night .card,body.night .actions,body.night .helpBox,body.night textarea,body.night .nav{
      background:
        linear-gradient(180deg,rgba(255,255,255,.082),rgba(255,255,255,.028)),
        radial-gradient(circle at 50% 0%, rgba(186,206,234,.035), transparent 44%);
      border-color:rgba(236,228,212,.08);
      color:var(--nightText);
      box-shadow:0 18px 40px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.06), inset 0 -1px 0 rgba(255,255,255,.015);
      backdrop-filter:blur(18px) saturate(1.04);
      -webkit-backdrop-filter:blur(18px) saturate(1.04)
    }
    body.night .garden{
      background:
        radial-gradient(ellipse at 50% -2%, rgba(241,243,255,.03) 0%, transparent 26%),
        radial-gradient(circle at 52% 18%, rgba(117,147,187,.05) 0%, transparent 24%),
        linear-gradient(180deg, rgba(10,15,22,.78) 0%, rgba(7,11,17,.92) 22%, rgba(6,9,14,.98) 100%);
      border-color:rgba(236,228,212,.07);
      box-shadow:0 22px 44px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.03), inset 0 -40px 80px rgba(0,0,0,.34), inset 0 18px 50px rgba(134,160,206,.03)
    }
    body.night .garden::before{
      opacity:1;
      background:
        linear-gradient(180deg,rgba(255,255,255,.03) 0%,rgba(255,255,255,.01) 9%,rgba(255,255,255,0) 24%),
        radial-gradient(ellipse at 50% 10%, rgba(218,226,246,.05) 0%, transparent 18%),
        radial-gradient(circle at 18% 22%, rgba(255,255,255,.09) 0 .8px, transparent 1.4px),
        radial-gradient(circle at 30% 14%, rgba(255,255,255,.08) 0 .7px, transparent 1.3px),
        radial-gradient(circle at 68% 20%, rgba(255,255,255,.08) 0 .75px, transparent 1.35px),
        radial-gradient(circle at 82% 12%, rgba(255,255,255,.07) 0 .65px, transparent 1.25px);
      animation:starPulse 8s ease-in-out infinite;
    }
    body.night .garden::after{
      opacity:1;
      background:
        linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,.08) 20%,rgba(0,0,0,.24) 100%),
        radial-gradient(ellipse at 50% 100%, rgba(140,168,205,.06) 0%, transparent 34%);
    }
    body.night .barBg{background:rgba(255,255,255,.08)}
    body.night .barFill{background:linear-gradient(90deg,rgba(214,191,147,.84) 0%,rgba(171,164,123,.72) 44%,rgba(123,147,132,.66) 100%)}
    body.night input[type=range]::-webkit-slider-thumb{background:linear-gradient(180deg,#fbfdfb,#e1e8e3);border-color:#d7bf97}
    body.night textarea{color:var(--nightText)}
    body.night textarea::placeholder{color:rgba(229,238,232,.34)}
    body.night .tab{color:rgba(224,232,226,.48)}
    body.night .tab.active{background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.045));color:#dcc39a}
    body.night .btn{
      background:linear-gradient(180deg,rgba(255,255,255,.11),rgba(255,255,255,.038));
      color:var(--nightText);
      border-color:rgba(236,228,212,.09);
      box-shadow:0 12px 28px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.07), inset 0 -1px 0 rgba(255,255,255,.015)
    }
    body.night .creature{
      color:rgba(244,249,246,.94);
      border-color:rgba(255,255,255,.16);
      box-shadow:0 26px 48px rgba(0,0,0,.34),0 0 0 1px rgba(255,255,255,.03), inset 0 1px 0 rgba(255,255,255,.08), 0 0 22px rgba(156,186,210,.06)
    }
    body.night .creature span{text-shadow:0 1px 0 rgba(0,0,0,.30)}
    body.night .empty{color:rgba(229,238,232,.30)}
    body.night .modal{background:linear-gradient(180deg,rgba(18,24,29,.97),rgba(11,15,19,.95));border:1px solid rgba(236,228,212,.08);color:var(--nightText);box-shadow:0 34px 94px rgba(0,0,0,.48), inset 0 1px 0 rgba(255,255,255,.04)}
    body.night .modal p,body.night .sign{color:rgba(229,238,232,.32)}
    @media (max-width:390px){.shell{padding:12px}.frame{min-height:calc(100dvh - 24px)}.view{padding:16px}.row,.actions{grid-template-columns:1fr}}
  </style>
</head>
<body class="day">
  <div class="sky"></div>
  <canvas class="branches" id="bgCanvas"></canvas>
  <main class="shell"><section class="frame"><header><h1 id="modeTitle">Дневной свет</h1><div class="sub">Отметьте состояние и уберите лишнее из фокуса.</div></header><div class="content"><div class="view active" id="view-today"><div class="card"><div class="top"><span class="label">Состояние</span><span class="state" id="stateText">Спокойно</span></div><div class="barWrap"><div class="barBg"><div class="barFill" id="barFill"></div></div><input id="slider" type="range" min="0" max="4" step="1" value="2" /></div><div class="scaleLabels"><span>Тяжело</span><span>Ниже обычного</span><span>Спокойно</span><span>Собранно</span><span>Сильно</span></div><p class="desc" id="stateDesc"></p></div><textarea id="thoughtInput" placeholder="Что сейчас мешает?"></textarea><div class="row"><button class="btn" id="addBtn">Выгрузить из головы</button><button class="btn" id="themeBtn">Тема: авто</button></div></div><div class="view" id="view-garden"><div class="garden" id="garden"><div class="empty" id="emptyGarden">Сад пуст.<br />Добавьте первую мысль.</div></div><div class="actions" id="actions"><button class="btn" id="compressBtn">Сжать</button><button class="btn" id="sendBtn">Вдаль</button><button class="btn" id="dissolveBtn">Растворить</button></div></div><div class="view" id="view-help"><button class="btn" id="waveBtn">Сбросить волну</button><div class="helpBox"><canvas id="calmCanvas"></canvas></div></div></div><nav class="nav"><button class="tab active" data-view="today">Сегодня</button><button class="tab" data-view="garden">Сад</button><button class="tab" data-view="help">Помощь</button></nav><div class="sign">@parchaipodusham</div></section></main><div class="overlay" id="overlay"><div class="modal"><h2 id="waveTitle">Мягкая волна</h2><p id="waveText">Просто смотрите и идите по шагам.</p><div class="modalRow"><button class="btn" id="waveMain">Начать</button><button class="btn" id="waveClose">Закрыть</button></div></div></div>
  <script>
    const body=document.body,tabs=[...document.querySelectorAll('.tab')],views=[...document.querySelectorAll('.view')],themeBtn=document.getElementById('themeBtn'),modeTitle=document.getElementById('modeTitle'),slider=document.getElementById('slider'),stateText=document.getElementById('stateText'),stateDesc=document.getElementById('stateDesc'),barFill=document.getElementById('barFill'),thoughtInput=document.getElementById('thoughtInput'),addBtn=document.getElementById('addBtn'),garden=document.getElementById('garden'),emptyGarden=document.getElementById('emptyGarden'),actions=document.getElementById('actions'),compressBtn=document.getElementById('compressBtn'),sendBtn=document.getElementById('sendBtn'),dissolveBtn=document.getElementById('dissolveBtn'),waveBtn=document.getElementById('waveBtn'),overlay=document.getElementById('overlay'),waveTitle=document.getElementById('waveTitle'),waveText=document.getElementById('waveText'),waveMain=document.getElementById('waveMain'),waveClose=document.getElementById('waveClose'),bgCanvas=document.getElementById('bgCanvas'),bgCtx=bgCanvas.getContext('2d'),calmCanvas=document.getElementById('calmCanvas'),calmCtx=calmCanvas.getContext('2d');
    let theme='auto',selectedId=null,selectedEl=null,waveStep=0,waveStarted=false,calmTime=0;
    const states=[{title:'Тяжело',desc:'Лучше снизить нагрузку и убрать лишнее.'},{title:'Ниже обычного',desc:'Оставьте только самое нужное.'},{title:'Спокойно',desc:'Можно двигаться без спешки.'},{title:'Собранно',desc:'Хорошее состояние для важных дел.'},{title:'Сильно',desc:'Есть запас внимания и сил.'}],waveSteps=[{title:'Мягкая волна',text:'Просто смотрите и идите по шагам.'},{title:'Посмотрите вокруг',text:'Найдите взглядом 3 спокойных предмета.'},{title:'Почувствуйте опору',text:'Заметьте стопы, спину и поверхность под ладонью.'},{title:'Сделайте выдох',text:'Медленно выдыхайте дольше, чем вдыхаете.'}];
    let creatures=JSON.parse(localStorage.getItem('garden_items')||'[]');
    const save=()=>localStorage.setItem('garden_items',JSON.stringify(creatures));
    function setView(name){views.forEach(v=>v.classList.toggle('active',v.id===`view-${name}`));tabs.forEach(t=>t.classList.toggle('active',t.dataset.view===name));if(name!=='garden')clearSelection();resizeCalm()} tabs.forEach(t=>t.addEventListener('click',()=>setView(t.dataset.view)));
    function updateState(){const v=+slider.value;stateText.textContent=states[v].title;stateDesc.textContent=states[v].desc;barFill.style.width=(v/4)*100+'%'} slider.addEventListener('input',updateState);updateState();
    function applyTheme(){const h=new Date().getHours(),night=theme==='night'||(theme==='auto'&&(h<7||h>20));body.className=night?'night':'day';modeTitle.textContent=night?'Ночной покой':'Дневной свет';themeBtn.textContent='Тема: '+(theme==='auto'?'авто':theme==='light'?'свет':'ночь');renderGarden();resizeBg();resizeCalm()} themeBtn.addEventListener('click',()=>{theme=theme==='auto'?'light':theme==='light'?'night':'auto';applyTheme()});
    function hue(){return [18,32,42,58,142,168,196,228,286,326][Math.floor(Math.random()*10)]}
    function addCreature(){const txt=thoughtInput.value.trim();if(!txt)return;const h=hue();creatures.push({id:Date.now()+Math.floor(Math.random()*1000),text:txt,x:Math.random()*66+8,y:Math.random()*62+12,colorLight:`hsla(${h},58%,74%,0.52)`,colorNight:`hsla(${h},44%,48%,0.26)`});thoughtInput.value='';save();renderGarden();setView('garden')} addBtn.addEventListener('click',addCreature);
    function clearSelection(){selectedId=null;if(selectedEl)selectedEl.classList.remove('selected');selectedEl=null;actions.classList.remove('show')}
    function selectCreature(id,el){if(selectedEl)selectedEl.classList.remove('selected');selectedId=id;selectedEl=el;el.classList.add('selected');actions.classList.add('show')}
    function renderGarden(){clearSelection();garden.querySelectorAll('.creature').forEach(el=>el.remove());if(!creatures.length){emptyGarden.style.display='grid';return}emptyGarden.style.display='none';creatures.forEach(c=>{const el=document.createElement('button');el.className='creature';el.type='button';el.style.left=c.x+'%';el.style.top=c.y+'%';el.style.background=body.classList.contains('night')?c.colorNight:c.colorLight;el.innerHTML=`<span>${c.text}</span>`;el.addEventListener('click',e=>{e.stopPropagation();selectCreature(c.id,el)});garden.appendChild(el)})}
    garden.addEventListener('click',e=>{if(e.target===garden)clearSelection()});
    function removeSelected(kind){if(!selectedId||!selectedEl)return;const id=selectedId,el=selectedEl;if(kind==='send'){el.style.left='108%';el.style.top='6%';el.style.transform='scale(.55) rotate(12deg)';el.style.opacity='0';el.style.filter='blur(6px)'}else{el.style.borderRadius='50%';el.style.transform='scale(.25)';el.style.opacity='0';el.style.filter=kind==='compress'?'blur(10px)':'blur(16px) saturate(.7)'}clearSelection();setTimeout(()=>{creatures=creatures.filter(i=>i.id!==id);save();renderGarden()},1300)}
    compressBtn.addEventListener('click',()=>removeSelected('compress'));sendBtn.addEventListener('click',()=>removeSelected('send'));dissolveBtn.addEventListener('click',()=>removeSelected('dissolve'));
    function openWave(){waveStarted=false;waveStep=0;updateWave();overlay.style.display='flex'} function closeWave(){overlay.style.display='none';waveStarted=false;waveStep=0;updateWave()} function updateWave(){waveTitle.textContent=waveSteps[waveStep].title;waveText.textContent=waveSteps[waveStep].text;waveMain.textContent=!waveStarted?'Начать':waveStep<waveSteps.length-1?'Дальше':'Завершить'} function nextWave(){if(!waveStarted){waveStarted=true;waveStep=1;updateWave();return}if(waveStep<waveSteps.length-1){waveStep+=1;updateWave()}else closeWave()}
    waveBtn.addEventListener('click',openWave);waveMain.addEventListener('click',nextWave);waveClose.addEventListener('click',closeWave);overlay.addEventListener('click',e=>{if(e.target===overlay)closeWave()});
    function resizeCanvas(canvas,ctx){const dpr=window.devicePixelRatio||1,rect=canvas.getBoundingClientRect();canvas.width=Math.max(1,rect.width*dpr);canvas.height=Math.max(1,rect.height*dpr);ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr)} const resizeBg=()=>resizeCanvas(bgCanvas,bgCtx),resizeCalm=()=>resizeCanvas(calmCanvas,calmCtx);
    function branch(x,y,len,angle,depth){if(depth===0)return;const x2=x+Math.cos(angle)*len,y2=y+Math.sin(angle)*len;bgCtx.beginPath();bgCtx.moveTo(x,y);bgCtx.lineTo(x2,y2);bgCtx.strokeStyle=body.classList.contains('night')?'rgba(191,210,225,.045)':'rgba(169,133,83,.08)';bgCtx.lineWidth=Math.max(.6,depth*.68);bgCtx.stroke();branch(x2,y2,len*.74,angle-.42,depth-1);branch(x2,y2,len*.74,angle+.42,depth-1)} function drawBg(){const w=bgCanvas.clientWidth,h=bgCanvas.clientHeight;bgCtx.clearRect(0,0,w,h);branch(w/2,h+8,h/6.6,-Math.PI/2,8);requestAnimationFrame(drawBg)}
    function petal(cx,cy,r,a,t,night){calmCtx.save();calmCtx.translate(cx,cy);calmCtx.rotate(a+Math.sin(t*.00045+a)*.08);const len=r*1.05,w=r*.28;calmCtx.beginPath();calmCtx.moveTo(0,0);calmCtx.bezierCurveTo(w,-w,len*.75,-w*.7,len,0);calmCtx.bezierCurveTo(len*.75,w*.7,w,w,0,0);const g=calmCtx.createLinearGradient(0,0,len,0);g.addColorStop(0,night?'rgba(245,250,247,.18)':'rgba(255,255,255,.34)');g.addColorStop(.5,night?'rgba(205,223,212,.10)':'rgba(231,214,186,.18)');g.addColorStop(1,'rgba(255,255,255,0)');calmCtx.fillStyle=g;calmCtx.fill();calmCtx.strokeStyle=night?'rgba(245,250,247,.10)':'rgba(255,255,255,.18)';calmCtx.lineWidth=1.1;calmCtx.stroke();calmCtx.restore()}
    function halos(cx,cy,t,night){for(let i=0;i<3;i++){const p=((t*.00010+i*.30)%1),r=34+p*145,a=(1-p)*(night?.10:.13);calmCtx.beginPath();calmCtx.arc(cx,cy,r,0,Math.PI*2);calmCtx.strokeStyle=night?`rgba(226,236,229,${a})`:`rgba(176,146,104,${a})`;calmCtx.lineWidth=1.25-p*.4;calmCtx.stroke()}}
    function core(cx,cy,w,h,t,night){const breath=.5+.5*Math.sin(t*.00105),r=Math.min(w,h)*(.11+breath*.018),glow=calmCtx.createRadialGradient(cx,cy,12,cx,cy,Math.min(w,h)*.34);glow.addColorStop(0,night?'rgba(243,248,245,.28)':'rgba(255,255,255,.52)');glow.addColorStop(.45,night?'rgba(194,216,203,.10)':'rgba(225,206,177,.16)');glow.addColorStop(1,'rgba(255,255,255,0)');calmCtx.fillStyle=glow;calmCtx.fillRect(0,0,w,h);const pearl=calmCtx.createRadialGradient(cx-r*.25,cy-r*.25,r*.08,cx,cy,r);pearl.addColorStop(0,night?'rgba(252,254,253,.50)':'rgba(255,255,255,.96)');pearl.addColorStop(.4,night?'rgba(224,236,228,.22)':'rgba(247,239,229,.64)');pearl.addColorStop(1,night?'rgba(181,201,188,.08)':'rgba(221,204,178,.14)');calmCtx.beginPath();calmCtx.arc(cx,cy,r,0,Math.PI*2);calmCtx.fillStyle=pearl;calmCtx.fill()} function drawCalm(){const w=calmCanvas.clientWidth,h=calmCanvas.clientHeight;calmCtx.clearRect(0,0,w,h);const night=body.classList.contains('night'),cx=w/2,cy=h/2,bg=calmCtx.createRadialGradient(cx,cy,20,cx,cy,Math.min(w,h)*.46);bg.addColorStop(0,night?'rgba(226,236,229,.08)':'rgba(255,255,255,.18)');bg.addColorStop(.5,night?'rgba(139,167,151,.04)':'rgba(212,190,157,.08)');bg.addColorStop(1,'rgba(255,255,255,0)');calmCtx.fillStyle=bg;calmCtx.fillRect(0,0,w,h);halos(cx,cy,calmTime,night);const count=8,base=Math.min(w,h)*.22;for(let i=0;i<count;i++)petal(cx,cy,base,(Math.PI*2/count)*i,calmTime+i*180,night);core(cx,cy,w,h,calmTime,night);calmTime+=16;requestAnimationFrame(drawCalm)}
    window.addEventListener('resize',()=>{resizeBg();resizeCalm()});setInterval(()=>{if(!creatures.length)return;creatures=creatures.map(c=>({...c,x:Math.max(6,Math.min(84,c.x+(Math.random()-.5)*3.4)),y:Math.max(9,Math.min(82,c.y+(Math.random()-.5)*3.4))}));const nodes=garden.querySelectorAll('.creature');nodes.forEach((el,i)=>{if(!creatures[i])return;if(selectedId&&String(creatures[i].id)===String(selectedId))return;el.style.left=creatures[i].x+'%';el.style.top=creatures[i].y+'%'});save()},5200);
    applyTheme();renderGarden();updateWave();resizeBg();resizeCalm();requestAnimationFrame(drawBg);requestAnimationFrame(drawCalm);
  </script>
</body>
